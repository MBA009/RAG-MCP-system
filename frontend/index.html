<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Second Brain</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:#0f0f13; --bg2:#18181f; --bg3:#22222c; --border:#2e2e3a; --border2:#3e3e4e;
    --text:#e2e2ee; --text2:#9898b0; --text3:#5a5a70;
    --purple:#8b7cf8; --purple2:#6c5ce7; --teal:#4ecdc4; --coral:#ff6b6b;
    --amber:#ffd93d; --green:#6bcb77; --radius:10px; --sidebar:280px;
  }
  .delete-btn {
  background: transparent;
  border: none;
  color: var(--text3);
  cursor: pointer;
  font-size: 11px;
  padding: 2px 5px;
  border-radius: 4px;
  flex-shrink: 0;
  opacity: 0;
  transition: all .15s;
}
.source-item:hover .delete-btn { opacity: 1; }
.delete-btn:hover { background: #3d1a1a; color: var(--coral); }
  body { background:var(--bg); color:var(--text); font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; font-size:14px; height:100vh; display:flex; overflow:hidden; }
  #sidebar { width:var(--sidebar); background:var(--bg2); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; }
  .sidebar-header { padding:20px 16px 14px; border-bottom:1px solid var(--border); }
  .logo { font-size:16px; font-weight:600; display:flex; align-items:center; gap:8px; }
  .logo-dot { width:10px; height:10px; background:var(--purple); border-radius:50%; }
  .logo-sub { font-size:11px; color:var(--text3); margin-top:2px; }
  .sidebar-section { padding:12px 16px 8px; font-size:10px; font-weight:600; color:var(--text3); letter-spacing:.08em; text-transform:uppercase; }
  .source-list { flex:1; overflow-y:auto; padding:0 8px; }
  .source-item { padding:8px 10px; border-radius:7px; margin-bottom:2px; display:flex; align-items:center; gap:8px; }
  .source-item:hover { background:var(--bg3); }
  .source-type-badge { font-size:9px; padding:2px 5px; border-radius:3px; font-weight:600; flex-shrink:0; }
  .type-pdf{background:#3d1a1a;color:var(--coral)} .type-markdown{background:#1a2a1a;color:var(--green)}
  .type-notion{background:#1a1a3d;color:var(--purple)} .type-youtube{background:#3d2a1a;color:var(--amber)}
  .type-web{background:#1a2a2a;color:var(--teal)} .type-code{background:#2a1a2a;color:#c792ea}
  .type-obsidian{background:#2a1a3d;color:#b39ddb} .type-text{background:#2a2a2a;color:var(--text2)}
  .source-name { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .sidebar-bottom { padding:12px 8px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:6px; }
  .add-btn { width:100%; padding:8px 12px; border-radius:7px; border:1px dashed var(--border2); background:transparent; color:var(--text3); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; gap:6px; transition:all .15s; }
  .add-btn:hover { border-color:var(--purple); color:var(--purple); background:#1a1a2a; }
  .add-panel { display:none; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:12px; margin:0 0 6px; }
  .add-panel.open { display:block; }
  .add-panel select, .add-panel input[type="text"] { width:100%; padding:7px 10px; background:var(--bg2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-size:12px; margin-bottom:6px; outline:none; }
  .add-panel select:focus, .add-panel input[type="text"]:focus { border-color:var(--purple); }
  .add-panel-row { display:flex; gap:6px; }
  .btn-small { padding:6px 12px; border-radius:6px; border:none; font-size:12px; cursor:pointer; flex:1; }
  .btn-primary { background:var(--purple2); color:#fff; } .btn-primary:hover { background:var(--purple); }
  .btn-ghost { background:var(--bg2); color:var(--text2); border:1px solid var(--border); } .btn-ghost:hover { color:var(--text); }
  .drop-zone { border:1px dashed var(--border2); border-radius:6px; padding:12px; text-align:center; color:var(--text3); font-size:11px; cursor:pointer; transition:all .15s; margin-bottom:6px; }
  .drop-zone:hover { border-color:var(--purple); color:var(--purple); background:#1a1a2a; }
  .drop-zone.has-file { border-color:var(--green); color:var(--green); background:#0d1a0d; }
  #main { flex:1; display:flex; flex-direction:column; min-width:0; }
  #chat-header { padding:16px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .chat-title { font-size:15px; font-weight:500; } .chat-sub { font-size:11px; color:var(--text3); margin-top:1px; }
  .stats-pills { display:flex; gap:8px; }
  .stat-pill { font-size:11px; padding:3px 10px; border-radius:20px; background:var(--bg3); color:var(--text2); border:1px solid var(--border); }
  #messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:24px; }
  .message { display:flex; gap:12px; max-width:820px; }
  .message.user { flex-direction:row-reverse; align-self:flex-end; }
  .avatar { width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:13px; flex-shrink:0; }
  .avatar.user-av { background:var(--purple2); color:#fff; font-weight:600; }
  .avatar.brain-av { background:var(--bg3); border:1px solid var(--border2); }
  .bubble { background:var(--bg2); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; line-height:1.7; max-width:680px; }
  .message.user .bubble { background:#1e1a36; border-color:var(--purple2); }
  .sources-bar { margin-top:12px; padding-top:10px; border-top:1px solid var(--border); display:flex; flex-wrap:wrap; gap:6px; }
  .source-chip { font-size:11px; padding:3px 8px; border-radius:5px; background:var(--bg3); border:1px solid var(--border); color:var(--text2); display:flex; align-items:center; gap:4px; }
  .source-score { font-size:10px; color:var(--text3); background:var(--bg); padding:1px 4px; border-radius:3px; }
  .typing-dot { display:inline-block; width:6px; height:6px; border-radius:50%; background:var(--text3); animation:blink 1.2s infinite; margin:0 1px; }
  .typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2}40%{opacity:1}}
  #input-bar { padding:16px 24px 20px; border-top:1px solid var(--border); }
  .input-wrap { display:flex; gap:8px; background:var(--bg2); border:1px solid var(--border2); border-radius:10px; padding:10px 12px; transition:border-color .15s; }
  .input-wrap:focus-within { border-color:var(--purple); }
  #msg-input { flex:1; background:transparent; border:none; outline:none; color:var(--text); font-size:14px; resize:none; line-height:1.5; max-height:140px; font-family:inherit; }
  #msg-input::placeholder { color:var(--text3); }
  #send-btn { background:var(--purple2); border:none; border-radius:7px; width:34px; height:34px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:background .15s; flex-shrink:0; align-self:flex-end; }
  #send-btn:hover { background:var(--purple); } #send-btn:disabled { opacity:.4; cursor:not-allowed; }
  #send-btn svg { fill:#fff; }
  .hint { font-size:11px; color:var(--text3); text-align:center; margin-top:8px; }
  .empty-state { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; color:var(--text3); }
  .empty-icon { font-size:40px; opacity:.4; } .empty-title { font-size:16px; color:var(--text2); }
  .empty-subs { font-size:13px; text-align:center; line-height:1.7; }
  .suggestion-row { display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin-top:8px; }
  .suggestion { padding:7px 14px; border-radius:20px; border:1px solid var(--border2); background:var(--bg2); color:var(--text2); font-size:12px; cursor:pointer; transition:all .15s; }
  .suggestion:hover { border-color:var(--purple); color:var(--purple); background:#1a1a2a; }
  #toast { position:fixed; bottom:20px; right:20px; background:var(--bg3); border:1px solid var(--border2); border-radius:8px; padding:10px 16px; font-size:13px; color:var(--text); z-index:200; opacity:0; transition:opacity .3s; pointer-events:none; max-width:320px; }
  #toast.show { opacity:1; } #toast.error { border-color:var(--coral); color:var(--coral); }
  ::-webkit-scrollbar{width:4px} ::-webkit-scrollbar-track{background:transparent} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<div id="sidebar">
  <div class="sidebar-header">
    <div class="logo"><div class="logo-dot"></div> Second Brain</div>
    <div class="logo-sub">Personal knowledge base</div>
  </div>
  <div class="sidebar-section">Knowledge sources</div>
  <div class="source-list" id="source-list">
    <div style="padding:12px;color:var(--text3);font-size:12px">Loading…</div>
  </div>
  <div class="sidebar-bottom">
    <div class="add-panel" id="add-panel">
      <select id="source-type">
        <option value="url">Web URL</option>
        <option value="youtube">YouTube video</option>
        <option value="notion">Sync all Notion pages</option>
        <option value="file">Upload a file</option>
      </select>
      <div id="url-wrap">
        <input type="text" id="source-input" placeholder="https://" />
      </div>
      <div id="file-wrap" style="display:none">
        <div class="drop-zone" id="drop-zone">Click to choose a file (PDF, MD, TXT, PY, DOCX)</div>
        <input type="file" id="file-input" style="display:none"
          accept=".pdf,.md,.txt,.py,.js,.ts,.docx,.html,.cpp,.c,.java,.rs,.go">
      </div>
      <div class="add-panel-row">
        <button class="btn-small btn-primary" id="add-submit">Add</button>
        <button class="btn-small btn-ghost" id="add-cancel">Cancel</button>
      </div>
    </div>
    <button class="add-btn" id="add-btn">+ Add source</button>
  </div>
</div>

<div id="main">
  <div id="chat-header">
    <div>
      <div class="chat-title">Ask your brain</div>
      <div class="chat-sub" id="chat-sub">Connecting…</div>
    </div>
    <div class="stats-pills" id="stats-pills"></div>
  </div>
  <div id="messages">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">&#129504;</div>
      <div class="empty-title">What do you want to know?</div>
      <div class="empty-subs">Ask anything — your ingested documents<br>will be searched automatically.</div>
      <div class="suggestion-row" id="suggestions"></div>
    </div>
  </div>
  <div id="input-bar">
    <div class="input-wrap">
      <textarea id="msg-input" rows="1" placeholder="Ask a question about your documents…"></textarea>
      <button id="send-btn">
        <svg width="16" height="16" viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2z"/></svg>
      </button>
    </div>
    <div class="hint">Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>
</div>

<div id="toast"></div>

<script>
var API = 'http://localhost:8000';
var chatHistory = [];
var isStreaming = false;
var selectedFile = null;

var SUGGESTIONS = [
  'Summarise what I have been reading',
  'What are the key concepts in my notes',
  'Find anything about machine learning',
  'What topics come up most often'
];

// ── Suggestions ───────────────────────────────────────────────────────────────
var sugEl = document.getElementById('suggestions');
SUGGESTIONS.forEach(function(text, i) {
  var btn = document.createElement('div');
  btn.className = 'suggestion';
  btn.textContent = text;
  btn.addEventListener('click', function() {
    document.getElementById('msg-input').value = text;
    sendMessage();
  });
  sugEl.appendChild(btn);
});

// ── Source type toggle ────────────────────────────────────────────────────────
document.getElementById('source-type').addEventListener('change', function() {
  var isFile = this.value === 'file';
  var isNotion = this.value === 'notion';
  document.getElementById('url-wrap').style.display  = (isFile || isNotion) ? 'none' : '';
  document.getElementById('file-wrap').style.display = isFile ? '' : 'none';
  selectedFile = null;
  document.getElementById('drop-zone').textContent = 'Click to choose a file (PDF, MD, TXT, PY, DOCX)';
  document.getElementById('drop-zone').className = 'drop-zone';
});

// ── File picker ───────────────────────────────────────────────────────────────
document.getElementById('drop-zone').addEventListener('click', function() {
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change', function() {
  if (this.files.length) {
    selectedFile = this.files[0];
    var dz = document.getElementById('drop-zone');
    dz.textContent = 'Selected: ' + selectedFile.name;
    dz.className = 'drop-zone has-file';
  }
});

document.getElementById('drop-zone').addEventListener('dragover', function(e) { e.preventDefault(); });
document.getElementById('drop-zone').addEventListener('drop', function(e) {
  e.preventDefault();
  var f = e.dataTransfer.files[0];
  if (f) {
    selectedFile = f;
    this.textContent = 'Selected: ' + f.name;
    this.className = 'drop-zone has-file';
  }
});

// ── Add panel toggle ──────────────────────────────────────────────────────────
document.getElementById('add-btn').addEventListener('click', function() {
  var panel = document.getElementById('add-panel');
  var open = panel.classList.toggle('open');
  this.textContent = open ? '✕ Close' : '+ Add source';
});

document.getElementById('add-cancel').addEventListener('click', function() {
  document.getElementById('add-panel').classList.remove('open');
  document.getElementById('add-btn').textContent = '+ Add source';
  document.getElementById('source-input').value = '';
  selectedFile = null;
});

// ── Add source ────────────────────────────────────────────────────────────────
document.getElementById('add-submit').addEventListener('click', async function() {
  var type  = document.getElementById('source-type').value;
  var input = document.getElementById('source-input').value.trim();
  var endpoint, body, isFormData = false;

  if (type === 'file') {
    if (!selectedFile) { showToast('Please select a file first', true); return; }
    var fd = new FormData();
    fd.append('file', selectedFile);
    endpoint = API + '/ingest/file';
    body = fd;
    isFormData = true;
  } else if (type === 'notion') {
    endpoint = API + '/ingest/notion';
    body = JSON.stringify({});
  } else if (type === 'youtube') {
    if (!input) { showToast('Please enter a YouTube URL', true); return; }
    endpoint = API + '/ingest/youtube';
    body = JSON.stringify({url: input});
  } else {
    if (!input) { showToast('Please enter a URL', true); return; }
    endpoint = API + '/ingest/url';
    body = JSON.stringify({url: input});
  }

  showToast('Adding… please wait');

  try {
    var headers = isFormData ? {} : {'Content-Type': 'application/json'};
    var r = await fetch(endpoint, {method: 'POST', headers: headers, body: body});
    var result = await r.json();
    if (r.ok) {
      var label = result.title || (result.ingested + ' pages');
      var chunks = result.chunks ? ' (' + result.chunks + ' chunks)' : '';
      showToast('Added: ' + label + chunks);
      document.getElementById('add-cancel').click();
      await loadSources();
      await loadStats();
    } else {
      showToast('Error: ' + (result.detail || 'Unknown error'), true);
    }
  } catch(e) {
    showToast('Error: ' + e.message, true);
  }
});

// ── Chat ──────────────────────────────────────────────────────────────────────
document.getElementById('send-btn').addEventListener('click', sendMessage);

document.getElementById('msg-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 140) + 'px';
});

async function sendMessage() {
  var input = document.getElementById('msg-input');
  var msg = input.value.trim();
  if (!msg || isStreaming) return;

  var emptyState = document.getElementById('empty-state');
  if (emptyState) emptyState.remove();

  input.value = '';
  input.style.height = 'auto';
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;

  appendMessage('user', esc(msg));

  var aid = 'msg-' + Date.now();
  appendMessage('assistant',
    '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>', aid);

  var fullText = '';
  var sources  = [];

  try {
    var resp = await fetch(API + '/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg, chatHistory: chatHistory})
    });
    if (!resp.ok) throw new Error('Server error ' + resp.status);

    var reader = resp.body.getReader();
    var decoder = new TextDecoder();
    var buffer = '';

    while (true) {
      var chunk = await reader.read();
      if (chunk.done) break;
      buffer += decoder.decode(chunk.value, {stream: true});
      var lines = buffer.split('\n');
      buffer = lines.pop();
      for (var i = 0; i < lines.length; i++) {
        var line = lines[i];
        if (!line.startsWith('data: ')) continue;
        try {
          var data = JSON.parse(line.slice(6));
          if (data.type === 'sources') sources = data.sources;
          else if (data.type === 'token') { fullText += data.text; updateBubble(aid, fullText, sources); }
        } catch(e) {}
      }
    }
  } catch(e) {
    updateBubble(aid, '<span style="color:var(--coral)">Error: ' + esc(e.message) + '</span>', []);
  }

  chatHistory.push({role:'user', content:msg});
  chatHistory.push({role:'assistant', content:fullText});
  if (chatHistory.length > 20) chatHistory = chatHistory.slice(-20);

  isStreaming = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

function appendMessage(role, content, id) {
  var msgs = document.getElementById('messages');
  var div = document.createElement('div');
  div.className = 'message ' + role;
  if (id) div.id = id;
  var av = role === 'user'
    ? '<div class="avatar user-av">B</div>'
    : '<div class="avatar brain-av">&#129504;</div>';
  div.innerHTML = av + '<div class="bubble">' + content + '</div>';
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
}

function updateBubble(id, text, sources) {
  var el = document.getElementById(id);
  if (!el) return;
  var bubble = el.querySelector('.bubble');
  var html = renderMd(text);
  if (sources && sources.length) {
    var chips = sources.map(function(s) {
      return '<span class="source-chip">' +
        '<span class="source-type-badge type-' + esc(s.source_type||'') + '">' + esc(s.source_type||'?') + '</span>' +
        esc(trunc(s.title, 25)) +
        '<span class="source-score">' + s.score + '</span>' +
        '</span>';
    }).join('');
    html += '<div class="sources-bar">' + chips + '</div>';
  }
  bubble.innerHTML = html;
  document.getElementById('messages').scrollTop = 999999;
}

// ── Stats & sources ───────────────────────────────────────────────────────────
async function loadStats() {
  try {
    var r = await fetch(API + '/stats');
    if (!r.ok) throw new Error();
    var s = await r.json();
    document.getElementById('chat-sub').textContent = s.sources + ' sources · ' + s.total_chunks + ' chunks indexed';
    document.getElementById('stats-pills').innerHTML =
      '<span class="stat-pill">' + s.sources + ' docs</span>' +
      '<span class="stat-pill">' + s.total_chunks + ' chunks</span>';
  } catch {
    document.getElementById('chat-sub').textContent = 'API not running — python cli.py web';
  }
}

async function loadSources() {
  try {
    var r = await fetch(API + '/sources');
    if (!r.ok) return;
    var sources = await r.json();
    var list = document.getElementById('source-list');
    if (!sources.length) {
      list.innerHTML = '<div style="padding:12px;color:var(--text3);font-size:12px">No sources yet.</div>';
      return;
    }
    list.innerHTML = sources.map(function(s) {
      return '<div class="source-item" style="justify-content:space-between" data-hash="' + esc(s.file_hash) + '">' +
        '<div style="display:flex;align-items:center;gap:8px;min-width:0">' +
          '<span class="source-type-badge type-' + esc(s.source_type) + '">' + esc(s.source_type) + '</span>' +
          '<span class="source-name">' + esc(s.title || s.source_path) + '</span>' +
        '</div>' +
        '<button class="delete-btn" data-hash="' + esc(s.file_hash) + '" title="Remove source">✕</button>' +
      '</div>';
    }).join('');

    // Attach delete handlers
    document.querySelectorAll('.delete-btn').forEach(function(btn) {
      btn.addEventListener('click', async function(e) {
        e.stopPropagation();
        var hash = this.getAttribute('data-hash');
        var item = this.closest('.source-item');
        var name = item.querySelector('.source-name').textContent;
        if (!confirm('Remove "' + name + '" from your Second Brain?')) return;
        try {
          var r = await fetch(API + '/source/' + hash, {method: 'DELETE'});
          if (r.ok) {
            item.style.opacity = '0';
            item.style.transition = 'opacity 0.2s';
            setTimeout(function() { item.remove(); }, 200);
            showToast('Removed: ' + name);
            await loadStats();
          } else {
            showToast('Failed to delete', true);
          }
        } catch(e) {
          showToast('Error: ' + e.message, true);
        }
      });
    });
  } catch(e) {}
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function trunc(str, n) { return str && str.length > n ? str.slice(0,n) + '…' : (str || ''); }

function renderMd(text) {
  return esc(text)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.*?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg);padding:1px 4px;border-radius:3px;font-size:12px">$1</code>')
    .replace(/\[(\d+)\]/g, '<sup style="color:var(--purple);font-weight:600">[$1]</sup>')
    .replace(/\n\n/g, '</p><p style="margin-top:8px">')
    .replace(/\n/g, '<br>');
}

var toastTimer;
function showToast(msg, isError) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'show error' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function() { t.className = ''; }, 3500);
}

loadStats();
loadSources();
</script>
</body>
</html>
